services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: txsftp
      POSTGRES_USER: txsftp
      POSTGRES_PASSWORD: txsftp
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txsftp -d txsftp"]
      interval: 5s
      timeout: 5s
      retries: 10

  txsftp:
    build: .
    ports:
      - "8888:8888"
    environment:
      DB_PASSWORD: txsftp
    volumes:
      - sftpdata:/data/sftp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  sftpdata:
